<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyVision — Share Meals Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0152B;--navy:#1B2A5E;--navy-dark:#0E1A3D;
  --bg:#E8ECF2;--white:#fff;--border:#E8E8E8;--border-light:#F0F0F0;
  --text:#1A1D23;--muted:#8A93A2;--light:#F7F7F7;
  --green:#16A34A;--green-bg:#3DAA5C;--green-light:#DCFCE7;
  --blue-active:#4FC3F7;
  --phone-w:340px;--phone-h:620px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 60px;user-select:none}

/* ── PAGE HEADER ── */
.pg-header{width:100%;background:var(--navy-dark);border-bottom:3px solid var(--red);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:18px;font-weight:700;color:white;letter-spacing:-0.5px}
.logo span{color:var(--red)}
.pg-sub{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.5px}

/* ── FLOW NAV ── */
.flow-nav{width:100%;background:var(--navy);padding:0 16px;display:flex;gap:0;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.08);scrollbar-width:none}
.flow-nav::-webkit-scrollbar{display:none}
.flow-btn{padding:12px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.45);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all 0.2s;font-family:'DM Sans',sans-serif;background:none;border-top:none;border-left:none;border-right:none;display:flex;align-items:center;gap:6px}
.flow-btn.active{color:white;border-bottom-color:var(--red)}
.flow-btn .fn{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.12);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.flow-btn.active .fn{background:var(--red)}

/* ── FLOW META ── */
.flow-meta{text-align:center;padding:16px 16px 4px}
.flow-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--red);margin-bottom:5px}
.flow-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:3px}
.flow-desc{font-size:12px;color:var(--muted);max-width:320px;margin:0 auto;line-height:1.5}

/* ── STEP DOTS ── */
.step-indicator{display:flex;align-items:center;gap:6px;padding:12px 0 16px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.3s;cursor:pointer}
.step-dot.active{width:24px;border-radius:4px;background:var(--red)}
.step-dot.done{background:var(--navy)}

/* ── PHONE FRAME ── */
.phone{width:var(--phone-w);height:var(--phone-h);background:white;border-radius:44px;box-shadow:0 0 0 2px #1a1d30,0 0 0 5px #0a0b14,0 28px 60px rgba(0,0,0,0.35);overflow:hidden;cursor:pointer;position:relative;transition:transform 0.1s}
.phone:active{transform:scale(0.985)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transform:translateX(30px);transition:opacity 0.25s ease,transform 0.25s ease;pointer-events:none}
.screen.active{opacity:1;transform:translateX(0);pointer-events:all}
.screen.exit{opacity:0;transform:translateX(-30px)}

/* ── PHONE CHROME ── */
.sb{background:white;padding:10px 20px 5px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sb .t{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.sb .i{font-size:10px;color:var(--text);display:flex;gap:4px;align-items:center}
.nb{background:white;padding:5px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.nb .bk{font-size:20px;color:var(--navy);min-width:32px;font-weight:400;line-height:1}
.nb .tt{font-size:15px;font-weight:700;color:var(--navy);text-align:center;flex:1;letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb .ac{font-size:14px;color:var(--navy);min-width:48px;text-align:right}

/* ── BOTTOM NAV ── */
.bnav{background:var(--navy);padding:6px 0 8px;display:flex;justify-content:space-around;align-items:center;flex-shrink:0}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bni svg{width:22px;height:22px;stroke:rgba(255,255,255,0.45);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bni span{font-size:10px;color:rgba(255,255,255,0.45)}
.bni.on svg{stroke:var(--blue-active)}
.bni.on span{color:var(--blue-active);font-weight:600}
.fab-wrap{flex:1;display:flex;justify-content:center;align-items:center;margin-top:-10px}
.fab{background:var(--red);border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(192,21,43,0.5)}
.fab svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round}

/* ── SCROLL CONTENT ── */
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:white}
.sc.grey{background:#F2F2F7}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1.5px solid var(--border);background:white;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;text-align:center;padding:10px 14px;font-size:11px;font-weight:600;color:var(--muted);position:relative;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.tab.on{color:var(--text)}
.tab.on::after{content:'';position:absolute;bottom:-1.5px;left:0;right:0;height:2.5px;background:var(--red)}

/* ── SEARCH BAR ── */
.srch{display:flex;align-items:center;gap:8px;background:white;border-bottom:1px solid var(--border);padding:9px 16px;flex-shrink:0}
.srch .si{font-size:15px;color:var(--muted)}
.srch .st{font-size:14px;color:var(--muted);flex:1}
.srch .sf{font-size:18px;color:var(--muted)}

/* ── MEAL LIST ── */
.list-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;flex-shrink:0}
.list-meta .lc{font-size:13px;font-weight:700;color:var(--text)}
.list-meta .lf{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text)}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:16px 16px;border-bottom:1px solid var(--border-light);background:white}
.mrow .mn{font-size:15px;font-weight:700;color:var(--text)}
.mrow .ms{font-size:11px;color:var(--muted);margin-top:2px}
.addbtn{width:30px;height:30px;background:var(--red);border-radius:50%;color:white;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-weight:300}

/* ── MEAL DETAIL ── */
.macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:18px 16px 12px;background:#F2F2F7}
.mac-item{text-align:center}
.mac-val{font-size:18px;font-weight:700;color:var(--text)}
.mac-lbl{font-size:12px;color:var(--muted);margin-top:2px}
.servings{display:flex;justify-content:center;padding:0 16px 14px;background:#F2F2F7}
.srv-box{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:8px;padding:6px 14px;background:white;font-size:13px;color:var(--text)}
.ing-card{background:white;padding:14px 16px;border-bottom:1px solid var(--border-light)}
.ing-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px}
.ing-macros{font-size:11px;color:var(--muted)}
.ing-per{font-size:11px;color:var(--muted);margin-top:2px}
.ing-row{display:flex;justify-content:space-between;align-items:flex-start}
.minus-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--red);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:18px;font-weight:300;flex-shrink:0}
.add-item{text-align:right;padding:8px 16px;background:#F2F2F7}
.add-item span{font-size:12px;font-weight:600;color:var(--red);letter-spacing:0.5px}
.btn-stack{padding:0 16px 36px;display:flex;flex-direction:column;gap:10px;background:white}
.btn-p{background:var(--red);color:white;border-radius:26px;padding:13px;font-size:13px;font-weight:600;text-align:center;width:100%}
.btn-o{border:1.5px solid var(--red);border-radius:26px;padding:12px;font-size:13px;font-weight:600;text-align:center;color:var(--red);background:white;width:100%}
.btn-g{background:transparent;color:var(--muted);padding:8px;font-size:12px;text-align:center;width:100%}

/* ── GREEN BANNER ── */
.green-banner{background:var(--green-bg);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.green-banner span{font-size:14px;font-weight:500;color:white}
.green-banner b{font-size:14px;font-weight:700;color:white}

/* ── SHARED BY BANNER ── */
.shared-by{background:#FFF0F1;border-bottom:1px solid #FECACA;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0}
.sb-name{font-size:10px;color:var(--navy)}
.sb-name strong{color:var(--red)}
.sb-time{font-size:10px;color:var(--muted);margin-top:1px}

/* ── TOGGLE ── */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px}
.tog-lbl{font-size:13px;font-weight:500;color:var(--text)}
.tog-sub{font-size:10px;color:var(--muted);margin-top:2px}
.tog{width:40px;height:22px;border-radius:11px;position:relative;flex-shrink:0}
.tog::after{content:'';position:absolute;top:2px;width:18px;height:18px;background:white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.2);transition:left 0.2s}
.tog.on{background:var(--red)}
.tog.on::after{left:calc(100% - 20px)}
.tog.off{background:#D1D5DB}
.tog.off::after{left:2px}

/* ── SETTINGS ROWS ── */
.set-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.set-lbl{font-size:14px;color:var(--text)}
.set-arr{font-size:14px;color:var(--muted)}

/* ── RECIPIENT PICKER ── */
.rec-section-lbl{font-size:11px;font-weight:600;color:var(--muted);padding:10px 16px 6px;text-transform:uppercase;letter-spacing:0.5px;background:white}
.bubbles{display:flex;gap:12px;padding:8px 16px 12px;background:white}
.bub{display:flex;flex-direction:column;align-items:center;gap:4px}
.bav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;position:relative;transition:all 0.2s}
.bav.sel{box-shadow:0 0 0 2.5px white,0 0 0 4.5px var(--red)}
.bcheck{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--green);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:700}
.bname{font-size:9px;color:var(--muted);text-align:center;max-width:46px}
.bname.sel{color:var(--red);font-weight:600}
.rli{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:white}
.rli-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.rli-name{font-size:14px;font-weight:500;color:var(--text);flex:1}
.rli-add{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);flex-shrink:0}
.rli-add.sel{background:var(--red);border-color:var(--red);color:white}
.spam-note{font-size:11px;color:var(--muted);text-align:center;padding:10px 16px;background:white}
.divider{height:1px;background:var(--border);margin:0}
.recent-lbl{font-size:11px;color:var(--muted);padding:8px 16px 4px;background:white}

/* ── CONSENT CARD ── */
.consent-card{margin:12px 16px;background:#FFF8F8;border:1px solid #FECACA;border-radius:10px;padding:14px}
.cc-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.cc-body{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.cc-check{display:flex;gap:10px;align-items:flex-start;padding:8px 0 12px}
.cc-box{width:18px;height:18px;border-radius:3px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.cc-box-lbl{font-size:12px;color:var(--text);line-height:1.5}
.cc-btns{display:flex;gap:8px}
.cc-yes{flex:1;background:var(--red);color:white;border-radius:20px;padding:9px;font-size:12px;font-weight:600;text-align:center}
.cc-no{flex:1;background:white;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:9px;font-size:12px;text-align:center}
.consent-once{font-size:11px;color:var(--muted);text-align:center;padding:8px 16px;line-height:1.5}

/* ── NOTIFICATIONS ── */
.notif-group-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.8px;padding:10px 16px 6px;background:white}
.notif-row{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:flex-start;background:white}
.notif-row.shared{background:#EEF3FF}
.notif-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--navy)}
.notif-icon svg{width:20px;height:20px}
.notif-text{font-size:13px;color:var(--text);line-height:1.4}
.notif-time{font-size:11px;color:var(--muted);margin-top:3px}

/* ── LOCKSCREEN ── */
.lockscreen{flex:1;background:linear-gradient(160deg,#0E1A3D 0%,#1B2A5E 100%);padding:16px}
.lock-time{text-align:center;font-size:34px;font-weight:700;color:white;letter-spacing:-1px;padding:12px 0 4px}
.lock-date{text-align:center;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:18px}
.push-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);border-radius:14px;padding:12px 14px}
.push-hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.push-app-icon{width:18px;height:18px;background:var(--red);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white}
.push-app-name{font-size:10px;color:rgba(255,255,255,0.5)}
.push-time{font-size:10px;color:rgba(255,255,255,0.4);margin-left:auto}
.push-title{font-size:13px;font-weight:600;color:white;margin-bottom:3px}
.push-body{font-size:11px;color:rgba(255,255,255,0.7);line-height:1.4}
.push-hint{font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-top:14px}

/* ── PROFILE ── */
.profile-intro{font-size:13px;color:var(--muted);padding:12px 16px 14px;line-height:1.6}
.profile-intro a{color:var(--navy);font-weight:500}
.section-head{font-size:15px;font-weight:700;color:var(--text);padding:14px 16px 10px}
.radio-opt{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--border)}
.radio-circle{width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;border:2px solid var(--border)}
.radio-circle.sel{background:var(--navy);border-color:var(--navy);display:flex;align-items:center;justify-content:center}
.radio-circle.sel::after{content:'';width:8px;height:8px;border-radius:50%;background:white}
.radio-text{font-size:13px;color:var(--text);line-height:1.5}
.checkbox-opt{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--border)}
.cb-box{width:20px;height:20px;border-radius:3px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.cb-box span{color:white;font-size:11px;font-weight:700}
.cb-text{font-size:13px;color:var(--text);line-height:1.5}
.profile-note{font-size:11px;color:var(--muted);padding:8px 16px;line-height:1.5}

/* ── LOG FOOD ── */
.cal-header{background:white;padding:10px 16px 14px;border-bottom:1px solid var(--border)}
.cal-month{text-align:center;font-size:17px;font-weight:600;color:var(--text);padding:4px 0 10px}
.cal-days{display:flex;justify-content:space-between;text-align:center;font-size:11px;color:var(--muted);padding:0 4px}
.cal-day{display:flex;flex-direction:column;align-items:center;gap:6px}
.cal-num{font-size:15px;color:var(--text);font-weight:500}
.cal-num.today{display:inline-block;width:30px;height:30px;background:#F5A623;border-radius:50%;line-height:30px;font-size:15px;font-weight:700;color:white}
.meal-slot{background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.slot-head{display:flex;align-items:center;justify-content:space-between}
.slot-left{display:flex;align-items:center;gap:10px}
.slot-icon{font-size:22px}
.slot-name{font-size:15px;font-weight:700;color:var(--text)}
.slot-right{display:flex;align-items:center;gap:8px}
.slot-lbl{font-size:12px;color:var(--muted)}
.slot-add{width:26px;height:26px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;font-weight:300}
.slot-added{background:var(--green-light);border:1px solid #86EFAC;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-top:10px}
.slot-added-icon{font-size:18px}
.slot-added-name{font-size:12px;font-weight:600;color:#14532D}
.slot-added-macros{font-size:10px;color:var(--green);margin-top:1px}

/* ── ADD BREAKFAST ── */
.cat-card{background:white;border-radius:12px;overflow:hidden;margin:0 16px}
.cat-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border)}
.cat-icon{width:42px;height:42px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cat-name{font-size:15px;font-weight:700;color:var(--text)}
.cat-count{font-size:13px;color:var(--muted)}
.cat-arr{font-size:16px;color:var(--muted);margin-left:auto}
.cat-row.active{background:#FFF5F5;border-left:3px solid var(--red)}
.cat-row.active .cat-name{color:var(--red)}
.cat-row.active .cat-arr{color:var(--red)}
.cat-section-lbl{font-size:15px;font-weight:700;color:var(--text);padding:14px 16px 10px}

/* ── CONTROLS ── */
.nav-controls{display:flex;align-items:center;gap:16px;margin-top:18px}
.nav-btn{width:40px;height:40px;border-radius:50%;background:white;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--navy);transition:all 0.15s;box-shadow:0 2px 6px rgba(0,0,0,0.07)}
.nav-btn:hover{background:var(--navy);color:white;border-color:var(--navy)}
.nav-btn:disabled{opacity:0.25;cursor:default;pointer-events:none}
.step-count{font-size:12px;color:var(--muted);min-width:60px;text-align:center}
.tap-hint{margin-top:14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.tap-icon{width:28px;height:28px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.7}}
</style>
</head>
<body>

<header class="pg-header">
  <div><div class="logo">MY<span>VISION</span></div></div>
  <div class="pg-sub">Share My Foods &amp; Meals · Prototype</div>
</header>

<nav class="flow-nav" id="flowNav"></nav>

<div class="flow-meta">
  <div class="flow-tag" id="flowTag"></div>
  <div class="flow-title" id="flowTitle"></div>
  <div class="flow-desc" id="flowDesc"></div>
</div>

let cf=0,cs=0;
function buildNav(){
  document.getElementById('flowNav').innerHTML=flows.map((f,i)=>
    `<button class="flow-btn${i===0?' active':''}" onclick="switchFlow(${i},this)"><span class="fn">${i+1}</span>${f.title}</button>`
  ).join('');
}
function updateMeta(){
  const f=flows[cf];
  document.getElementById('flowTag').textContent=f.tag;
  document.getElementById('flowTitle').textContent=f.title;
  document.getElementById('flowDesc').textContent=f.desc;
}
function renderDots(){
  const f=flows[cf];
  document.getElementById('stepDots').innerHTML=f.screens.map((_,i)=>
    `<div class="step-dot${i===cs?' active':i<cs?' done':''}" onclick="event.stopPropagation();goTo(${i})"></div>`
  ).join('');
  document.getElementById('stepCount').textContent=`${cs+1} of ${f.screens.length}`;
  document.getElementById('prevBtn').disabled=cs===0;
  document.getElementById('nextBtn').disabled=cs===f.screens.length-1;
}
function renderScreen(idx,dir){
  const phone=document.getElementById('phone');
  const ex=phone.querySelector('.screen.active');
  if(ex){ex.classList.add('exit');ex.classList.remove('active');setTimeout(()=>ex.remove(),260)}
  const el=document.createElement('div');
  el.className='screen';
  el.style.transform=`translateX(${dir==='forward'?30:-30}px)`;
  el.innerHTML=flows[cf].screens[idx].html;
  phone.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.classList.add('active');el.style.transform=''}));
  renderDots();
}
function goTo(i){if(i===cs)return;const dir=i>cs?'forward':'back';cs=i;renderScreen(cs,dir)}
function nextStep(){if(cs<flows[cf].screens.length-1){cs++;renderScreen(cs,'forward')}}
function prevStep(){if(cs>0){cs--;renderScreen(cs,'back')}}
function switchFlow(idx,btn){
  document.querySelectorAll('.flow-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  cf=idx;cs=0;updateMeta();
  document.getElementById('phone').innerHTML='';
  renderScreen(0,'forward');
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')nextStep();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevStep();
  const n=parseInt(e.key);
  if(n>=1&&n<=4)switchFlow(n-1,document.querySelectorAll('.flow-btn')[n-1]);
});
buildNav();updateMeta();renderScreen(0,'forward');
</script>
</body>
</html>
